# Render Blueprint — optional. You can also create a Web Service manually:
# New + → Web Service → connect repo → Environment: Docker → Root Dockerfile.
#
# MySQL: Render does not include managed MySQL. Use an external MySQL-compatible
# database (e.g. PlanetScale, Aiven, or another host), then set DATABASE_URL
# in the Render dashboard (mysql://user:pass@host:port/dbname?sslaccept=strict).
#
# Required env vars for production DB:
#   DATABASE_URL   OR   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
#   DB_SKIP_CREATE_DATABASE=1   (database already exists on the provider)
#
services:
  - type: web
    name: foodfusion
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DB_SKIP_CREATE_DATABASE
        value: "1"
      - key: DATABASE_URL
        sync: false
